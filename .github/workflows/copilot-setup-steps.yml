name: "Copilot Setup Steps"

# This workflow sets up the environment for the GitHub Copilot coding agent.
# The job name "copilot-setup-steps" is required by GitHub Copilot.
on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
